name: Publish Python package

on:
  workflow_call:
    inputs:
      version:
        description: "Release version to publish (e.g. 5.1.0)"
        required: true
        type: string
  workflow_dispatch:
    inputs:
      version:
        description: "Release version to publish (e.g. 5.1.0). Must match an existing git tag."
        required: true
        type: string

permissions:
  contents: write
  id-token: write
  attestations: write

jobs:
  publish:
    name: Publish to PyPI
    runs-on: ubuntu-latest
    environment:
      name: release
      url: https://pypi.org/p/confluence-markdown-exporter
    steps:
      - name: Checkout release tag
        uses: actions/checkout@v6
        with:
          ref: ${{ inputs.version }}

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync --locked --all-groups

      - name: Build distributions
        run: uv build --no-sources

      - name: Generate artifact attestations
        uses: actions/attest-build-provenance@v4.1.0
        with:
          subject-path: "dist/*"

      - name: Publish to PyPI
        run: uv publish

      - name: Sign the distributions with Sigstore
        uses: sigstore/gh-action-sigstore-python@v3.3.0
        with:
          inputs: >-
            ./dist/*.tar.gz
            ./dist/*.whl

      - name: Upload signed artifacts to GitHub Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload "${{ inputs.version }}" dist/** \
            --repo "$GITHUB_REPOSITORY"
